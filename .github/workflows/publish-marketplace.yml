name: publish-azure-devops-marketplace-extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version (for example 1.2.3)'
        required: true
  release:
    types:
      - published

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: marketplace
    env:
      ADO_RESOURCE_ID: 499b84ac-1321-427f-aa17-267ca6975798
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '>=22'

      - name: Install tooling
        run: npm install --global tfx-cli@0.23.1

      - name: Resolve extension version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW_TAG='${{ github.event.release.tag_name }}'
            VERSION="${RAW_TAG#v}"
          else
            VERSION='${{ inputs.version }}'
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be strict semver (x.y.z), got: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare extension
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
          EXTENSION_ID: ${{ vars.MARKETPLACE_EXTENSION_ID }}
        run: |
          # Keep extension task script aligned with the root source script before packaging.
          Copy-Item Prepare-DailyBuildBranch.ps1 azure-devops-extension/tasks/PrepareDailyBuildBranch/Prepare-DailyBuildBranch.ps1 -Force

          # Update task.json with structured version object (not expressible as a tfx argument).
          $parts = $env:VERSION.Split('.')
          $taskPath = 'azure-devops-extension/tasks/PrepareDailyBuildBranch/task.json'
          $task = Get-Content $taskPath -Raw | ConvertFrom-Json
          $task.version = [PSCustomObject]@{
            Major = [int]$parts[0]
            Minor = [int]$parts[1]
            Patch = [int]$parts[2]
          }
          $task | ConvertTo-Json -Depth 10 | Set-Content $taskPath -Encoding UTF8

          # Create tfx overrides file for the extension id (no dedicated tfx argument exists).
          [PSCustomObject]@{ id = $env:EXTENSION_ID } | ConvertTo-Json | Set-Content overrides.json -Encoding UTF8

      - name: Create VSIX package
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PUBLISHER: ${{ vars.MARKETPLACE_PUBLISHER_ID }}
        run: |
          tfx extension create \
            --manifest-globs azure-devops-extension/vss-extension.json \
            --root . \
            --output-path . \
            --version "$VERSION" \
            --publisher "$PUBLISHER" \
            --overrides-file overrides.json

      - name: Azure login using OIDC
        id: azure-login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Get Azure DevOps access token from OIDC session
        id: token
        run: |
          TOKEN=$(az account get-access-token --resource "$ADO_RESOURCE_ID" --query accessToken --output tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Get user profile
        run: |
          az rest -u https://app.vssps.visualstudio.com/_apis/profile/profiles/me \
            --resource "$ADO_RESOURCE_ID"

      - name: Publish extension to Marketplace
        env:
          ADO_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          VSIX=$(ls -1 *.vsix | head -n 1)
          tfx extension publish \
            --vsix "$VSIX" \
            --service-url https://marketplace.visualstudio.com \
            --auth-type pat \
            --token "$ADO_TOKEN" \
            --no-prompt
