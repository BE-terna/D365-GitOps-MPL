name: 'Publish: Azure DevOps Marketplace'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version (for example 1.2.3)'
        required: true
      environment:
        description: 'Target environment'
        required: true
        default: marketplace-preview
        type: choice
        options:
          - marketplace-preview
          - marketplace
  release:
    types:
      - published

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'marketplace' }}
    env:
      ADO_RESOURCE_ID: 499b84ac-1321-427f-aa17-267ca6975798
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '>=22'

      - name: Install tooling
        run: npm install --global tfx-cli@0.23.1

      - name: Resolve extension version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW_TAG='${{ github.event.release.tag_name }}'
            VERSION="${RAW_TAG#v}"
          else
            VERSION='${{ inputs.version }}'
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be strict semver (x.y.z), got: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare extension
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
          EXTENSION_ID: ${{ vars.MARKETPLACE_EXTENSION_ID }}
          TARGET_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'marketplace' }}
        run: |
          # Keep extension task script aligned with the module source script before packaging.
          Copy-Item D365GitOps/functions/DailyBuild/Prepare-DailyBuildBranch.ps1 azure-devops-extension/tasks/PrepareDailyBuildBranch/Prepare-DailyBuildBranch.ps1 -Force

          $isPublic = $env:TARGET_ENVIRONMENT -eq 'marketplace'
          [PSCustomObject]@{
            id = $env:EXTENSION_ID
            version = $env:VERSION
            public = $isPublic
          } | ConvertTo-Json | Set-Content overrides.json -Encoding UTF8

      - name: Create VSIX package
        env:
          PUBLISHER: ${{ vars.MARKETPLACE_PUBLISHER_ID }}
        run: |
          tfx extension create \
            --no-prompt \
            --manifest-globs vss-extension.json \
            --root azure-devops-extension \
            --output-path . \
            --publisher "$PUBLISHER" \
            --overrides-file overrides.json

      - name: Azure login using OIDC
        id: azure-login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Get Azure DevOps access token from OIDC session
        id: token
        run: |
          TOKEN=$(az account get-access-token --resource "$ADO_RESOURCE_ID" --query accessToken --output tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Get user profile
        run: |
          az rest -u https://app.vssps.visualstudio.com/_apis/profile/profiles/me \
            --resource "$ADO_RESOURCE_ID"

      - name: Publish extension to Marketplace
        env:
          ADO_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          VSIX=$(ls -1 *.vsix | head -n 1)
          tfx extension publish \
            --vsix "$VSIX" \
            --service-url https://marketplace.visualstudio.com \
            --auth-type pat \
            --token "$ADO_TOKEN" \
            --no-prompt
