name: publish-powershell-gallery

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version (for example 1.2.3)'
        required: true
      environment:
        description: 'Target environment'
        required: true
        default: psgallery
        type: choice
        options:
          - psgallery
      runner:
        description: 'Runner to use'
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
  release:
    types:
      - published

permissions:
  artifact-metadata: write
  attestations: write
  contents: write # Required for GH Release creation
  id-token: write

jobs:
  publish:
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner || 'ubuntu-latest' }}
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'psgallery' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve module version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW_TAG='${{ github.event.release.tag_name }}'
            VERSION="${RAW_TAG#v}"
          else
            VERSION='${{ inputs.version }}'
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be strict semver (x.y.z), got: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set module version
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          Update-ModuleManifest -Path ./D365GitOps/D365GitOps.psd1 -ModuleVersion $env:VERSION

      - name: Azure login using OIDC # Login to AZ CLI used for artifact signing
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        if: runner.os == 'Windows'
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Artifact Signing
        uses: Azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        if: runner.os == 'Windows'
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files-folder: ./D365GitOps
          files-folder-recurse: true
          trace: ${{ runner.debug == '1' }}
        
      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          POWERSHELLGALLERYAPIKEY: ${{ secrets.POWERSHELLGALLERYAPIKEY }}
        run: |
          Publish-PSResource -DestinationPath ./out -Path ./D365GitOps -Repository PSGallery -ApiKey $env:POWERSHELLGALLERYAPIKEY -Verbose
      
      - name: Generate Generic Attestations
        uses: actions/attest@v4.1.0
        with:
          subject-path: ./out/D365GitOps.*.nupkg
      
      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: D365GitOps
          path: ./out/D365GitOps.*.nupkg
      
      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: ./out/D365GitOps.*.nupkg
          generate_release_notes: true
