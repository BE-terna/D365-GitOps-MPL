name: 'Publish: PowerShell Gallery'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version (for example 1.2.3)'
        required: true
      environment:
        description: 'Target environment'
        required: true
        default: 'PowerShell Gallery'
        type: choice
        options:
          - 'PowerShell Gallery'
      runner:
        description: 'Runner to use'
        required: true
        default: windows-latest
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
  release:
    types:
      - published

permissions:
  artifact-metadata: write
  attestations: write
  contents: write # Required for GH Release creation
  id-token: write

jobs:
  publish:
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner || 'windows-latest' }}
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'PowerShell Gallery' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve module version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW_TAG='${{ github.event.release.tag_name }}'
            VERSION="${RAW_TAG#v}"
          else
            VERSION='${{ inputs.version }}'
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be strict semver (x.y.z), got: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set module version
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          Update-ModuleManifest -Path ./D365GitOps/D365GitOps.psd1 -ModuleVersion $env:VERSION

      - name: Azure login using OIDC # Login to AZ CLI used for artifact signing
        id: azureLogin
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        if: ${{ runner.os == 'Windows'  && vars.AZURE_CLIENT_ID && vars.AZURE_TENANT_ID }} # AZ login is only needed for artifact signing, which is currently only supported on Windows
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Artifact Signing PowerShell (old)
        uses: Azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        if: ${{ false && runner.os == 'Windows' && steps.azureLogin.outcome == 'success' && vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files-folder: ./D365GitOps
          files-folder-filter: 'ps1,psm1,psd1'
          files-folder-recurse: true
          trace: ${{ runner.debug == '1' }}

      - name: Artifact Signing PowerShell
        shell: pwsh
        if: ${{ runner.os == 'Windows' && steps.azureLogin.outcome == 'success' && vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
        env:
          TOOL_SIGN_VERBOSITY: ${{ case(runner.debug == '1', 'debug', 'information') }}
        run: |
          dotnet tool restore
          
          $signArgs = @(
            "--base-directory", (Get-Item -Path ./D365GitOps).FullName
            "--recurse-containers"
            "--artifact-signing-endpoint", "${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}"
            "--artifact-signing-account", "${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}"
            "--artifact-signing-certificate-profile", "${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}"
            "--azure-credential-type", "azure-cli"
            "--verbosity", $env:TOOL_SIGN_VERBOSITY
          )
          dotnet tool run sign code artifact-signing **/*.ps*1 -- @signArgs

          Push-Location D365GitOps
          $fileCatalog = New-FileCatalog -CatalogVersion 2 .
          Pop-Location

          dotnet tool run sign code artifact-signing $fileCatalog.FullName -- @signArgs

      - name: Create PowerShell module package
        id: package
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:RUNNER_TEMP artifacts
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          # Create the package (.nupkg) into the artifacts directory
          $createdPackage = Compress-PSResource -PassThru -DestinationPath $artifactDir -Path ./D365GitOps -Verbose

          "Package created: $($createdPackage.FullName)"
          "createdPackage=$($createdPackage.FullName)" >> $env:GITHUB_OUTPUT
      
      - name: Sign NuGet Package
        shell: pwsh
        if: ${{ runner.os == 'Windows' && steps.azureLogin.outcome == 'success' && vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
        env:
          CREATEDPACKAGE: ${{ steps.package.outputs.createdPackage }}
          TOOL_SIGN_VERBOSITY: ${{ case(runner.debug == '1', 'debug', 'information') }}
        run: |
          dotnet tool restore
          
          $signArgs = @(
            "code"
            "artifact-signing"
            $env:CREATEDPACKAGE
            "--application-name", "D365GitOps"
            "--artifact-signing-endpoint", "${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}"
            "--artifact-signing-account", "${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}"
            "--artifact-signing-certificate-profile", "${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}"
            "--azure-credential-type", "azure-cli"
            "--verbosity", $env:TOOL_SIGN_VERBOSITY
          )
          dotnet tool run sign -- @signArgs
      
      - name: Publish to PowerShell Gallery
        id: publishToGallery
        shell: pwsh
        env:
          POWERSHELLGALLERYAPIKEY: ${{ secrets.POWERSHELLGALLERYAPIKEY }}
          CREATEDPACKAGE: ${{ steps.package.outputs.createdPackage }}
        run: |
          if (-not (Get-PSResourceRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSResourceRepository -Default
          }
          
          # Publish the created package to PSGallery
          Publish-PSResource -NupkgPath $env:CREATEDPACKAGE -Repository PSGallery -ApiKey $env:POWERSHELLGALLERYAPIKEY -Verbose

      - name: Generate Generic Attestations
        uses: actions/attest@v4.1.0
        with:
          subject-path: ${{ steps.package.outputs.createdPackage }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: D365GitOps
          path: ${{ steps.package.outputs.createdPackage }}
      
      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: ${{ steps.package.outputs.createdPackage }}
          generate_release_notes: true
