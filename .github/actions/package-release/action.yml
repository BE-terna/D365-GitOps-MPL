name: Package Release

description: Build and optionally sign PowerShell and Marketplace packages, then upload them as artifacts.

inputs:
  version:
    description: SemVer version for workflow_dispatch. Ignored for release event.
    required: false
  marketplace-environment:
    description: Marketplace environment (marketplace-preview or marketplace).
    required: true
  marketplace-extension-id:
    description: Azure DevOps Marketplace extension id.
    required: true
  marketplace-publisher-id:
    description: Azure DevOps Marketplace publisher id.
    required: true
  azure-client-id:
    description: Azure app client id for OIDC login.
    required: false
  azure-tenant-id:
    description: Azure tenant id for OIDC login.
    required: false
  artifact-signing-endpoint:
    description: Azure artifact signing endpoint.
    required: false
  artifact-signing-account:
    description: Azure artifact signing account.
    required: false
  artifact-signing-certificate-profile:
    description: Azure artifact signing certificate profile.
    required: false

outputs:
  version:
    description: Resolved release version.
    value: ${{ steps.version.outputs.version }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '>=22'

    - name: Install tooling
      shell: bash
      run: npm install --global tfx-cli@0.23.1

    - name: Resolve release version
      id: version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          RAW_TAG='${{ github.event.release.tag_name }}'
          VERSION="${RAW_TAG#v}"
        else
          VERSION='${{ inputs.version }}'
        fi
        if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Version must be strict semver (x.y.z), got: $VERSION" >&2
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Set module version
      shell: pwsh
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        Update-ModuleManifest -Path ./D365GitOps/D365GitOps.psd1 -ModuleVersion $env:VERSION

    - name: Prepare marketplace extension manifest overrides
      shell: pwsh
      env:
        VERSION: ${{ steps.version.outputs.version }}
        EXTENSION_ID: ${{ inputs.marketplace-extension-id }}
        TARGET_ENVIRONMENT: ${{ inputs.marketplace-environment }}
      run: |
        Copy-Item D365GitOps/functions/DailyBuild/Merge-DailyBuildBranch.ps1 azure-devops-extension/tasks/Merge-DailyBuildBranch/Merge-DailyBuildBranch.ps1 -Force -Verbose

        $isPublic = $env:TARGET_ENVIRONMENT -eq 'marketplace'
        [PSCustomObject]@{
          id = $env:EXTENSION_ID
          version = $env:VERSION
          public = $isPublic
        } | ConvertTo-Json | Set-Content overrides.json -Encoding UTF8

    - name: Azure login using OIDC
      id: azureLogin
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      if: runner.os == 'Windows' && inputs.azure-client-id != '' && inputs.azure-tenant-id != ''
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        allow-no-subscriptions: true

    - name: Artifact signing PowerShell
      shell: pwsh
      if: runner.os == 'Windows' && steps.azureLogin.outcome == 'success' && inputs.artifact-signing-certificate-profile != ''
      env:
        TOOL_SIGN_VERBOSITY: ${{ case(runner.debug == '1', 'debug', 'information') }}
      run: |
        dotnet tool restore

        $signArgs = @(
          "--base-directory", (Get-Item -Path ./D365GitOps).FullName
          "--recurse-containers"
          "--artifact-signing-endpoint", "${{ inputs.artifact-signing-endpoint }}"
          "--artifact-signing-account", "${{ inputs.artifact-signing-account }}"
          "--artifact-signing-certificate-profile", "${{ inputs.artifact-signing-certificate-profile }}"
          "--azure-credential-type", "azure-cli"
          "--verbosity", $env:TOOL_SIGN_VERBOSITY
        )
        dotnet tool run sign code artifact-signing **/*.ps*1 -- @signArgs

        if ($env:FORCE_CREATE_CATALOG -eq 'true') {
          Push-Location D365GitOps
          $catalogFile = "catalog.cat"
          if (Test-Path -Path $catalogFile) {
            Remove-Item -Path $catalogFile -Force
          }
          $fileCatalog = New-FileCatalog -CatalogVersion 2 -CatalogFilePath $catalogFile
          Pop-Location
          dotnet tool run sign code artifact-signing $fileCatalog.FullName -- @signArgs
        }

    - name: Create PowerShell module package
      id: modulePackage
      shell: pwsh
      run: |
        $artifactDir = Join-Path $env:RUNNER_TEMP artifacts
        New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

        $createdPackage = Compress-PSResource -PassThru -DestinationPath $artifactDir -Path ./D365GitOps -Verbose

        "Package created: $($createdPackage.FullName)"
        "createdPackage=$($createdPackage.FullName)" >> $env:GITHUB_OUTPUT

    - name: Sign NuGet package
      shell: pwsh
      if: runner.os == 'Windows' && steps.azureLogin.outcome == 'success' && inputs.artifact-signing-certificate-profile != ''
      env:
        CREATEDPACKAGE: ${{ steps.modulePackage.outputs.createdPackage }}
        TOOL_SIGN_VERBOSITY: ${{ case(runner.debug == '1', 'debug', 'information') }}
      run: |
        dotnet tool restore

        $signArgs = @(
          "code"
          "artifact-signing"
          $env:CREATEDPACKAGE
          "--application-name", "D365GitOps"
          "--artifact-signing-endpoint", "${{ inputs.artifact-signing-endpoint }}"
          "--artifact-signing-account", "${{ inputs.artifact-signing-account }}"
          "--artifact-signing-certificate-profile", "${{ inputs.artifact-signing-certificate-profile }}"
          "--azure-credential-type", "azure-cli"
          "--verbosity", $env:TOOL_SIGN_VERBOSITY
        )
        dotnet tool run sign -- @signArgs

    - name: Create VSIX package
      shell: bash
      env:
        PUBLISHER: ${{ inputs.marketplace-publisher-id }}
      run: |
        tfx extension create \
          --manifest-globs vss-extension.json \
          --root azure-devops-extension \
          --output-path . \
          --publisher "$PUBLISHER" \
          --overrides-file overrides.json

    - name: Generate generic attestations
      uses: actions/attest@v4.1.0
      with:
        subject-path: |
          ${{ steps.modulePackage.outputs.createdPackage }}
          *.vsix

    - name: Upload PowerShell package artifact
      uses: actions/upload-artifact@v7.0.1
      with:
        name: d365gitops-psgallery-package
        path: ${{ steps.modulePackage.outputs.createdPackage }}

    - name: Upload VSIX artifact
      uses: actions/upload-artifact@v7.0.1
      with:
        name: d365gitops-marketplace-package
        path: '*.vsix'
