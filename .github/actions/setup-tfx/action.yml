name: 'Setup TFX CLI'
description: 'Set up Node.js and install TFX CLI with caching'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '>=22'

    - name: Setup npm prefix
      shell: bash
      run: npm config set prefix .npm-global

    - name: Cache TFX CLI
      id: cache
      uses: actions/cache@v5
      with:
        path: .npm-global
        key: tfx-cli-${{ runner.os }}-0.23.1
        restore-keys: |
          tfx-cli-${{ runner.os }}-

    - name: Install TFX CLI
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm install --global tfx-cli@0.23.1

    - name: Add npm-global to PATH
      shell: bash
      run: echo ".npm-global/bin" >> $GITHUB_PATH
