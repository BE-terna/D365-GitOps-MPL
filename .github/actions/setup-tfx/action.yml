name: 'Setup TFX CLI'
description: 'Set up Node.js and install TFX CLI with caching'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '>=22'

    - name: Cache npm global packages
      id: cache
      uses: actions/cache@v5
      with:
        path: ~/.npm
        key: npm-global-${{ runner.os }}-tfx-cli-0.23.1
        restore-keys: |
          npm-global-${{ runner.os }}-

    - name: Install TFX CLI
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm install --global tfx-cli@0.23.1
