trigger: none

schedules:
  - cron: '0 3 * * 1-5'
    displayName: Weekday 3am
    branches:
      include:
        - main
    always: true

parameters:
  - name: mergeStrategy
    type: string
    default: merge
    values:
      - merge
      - squash
  - name: dailyBuildBranch
    type: string
    default: daily-build
  - name: defaultPriority
    type: number
    default: 100
  - name: skipUnchangedPush
    type: boolean
    default: false

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    fetchDepth: 0
    persistCredentials: true

  # Example usage:
  # - mergeStrategy: merge   -> merge commits preserved
  # - mergeStrategy: squash  -> PRs flattened into one commit each
  # - dailyBuildBranch: custom daily branch name
  - task: PowerShell@2
    displayName: Prepare daily build branch
    inputs:
      targetType: inline
      pwsh: true
      script: |
        $arguments = @(
          '-MergeStrategy', "${{ parameters.mergeStrategy }}",
          '-DailyBuildBranch', "${{ parameters.dailyBuildBranch }}",
          '-DefaultPriority', "${{ parameters.defaultPriority }}"
        )
        if ("${{ parameters.skipUnchangedPush }}" -eq 'true') {
          $arguments += '-SkipUnchangedPush'
        }
        # Uses the source script from the module functions layout.
        $scriptPath = '$(Build.SourcesDirectory)/D365GitOps/functions/DailyBuild/Prepare-DailyBuildBranch.ps1'
        if (-not (Test-Path -Path $scriptPath)) {
          throw "Script not found: $scriptPath"
        }
        & $scriptPath @arguments
    env:
      DEVOPS_PAT: $(System.AccessToken)
      AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
